<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Simply Plural Member Export</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <h1>Simply Plural Member Export</h1>

      <div class="card">
        <label for="apikey">API Key</label
        ><input
          id="apikey"
          type="password"
          placeholder="Paste your Simply Plural API key here"
        />
        <div class="info-note">
          Generate an API key in the Simply Plural app under
          <strong>Settings &gt; Account &gt; Tokens</strong>.
        </div>

        <p></p>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="exportMember" checked disabled />
            Export members (required)
          </label>
          <label>
            <input type="checkbox" id="exportHistory" />
            Export front history
          </label>
          <label>
            <input type="checkbox" id="exportComments" />
            Export front-history comments in a separate file
          </label>
          <label>
            <input type="checkbox" id="exportNotes" />
            Export member notes
          </label>
          <label>
            <input type="checkbox" id="exportBoard" />
            Export member board messages
          </label>
          <label>
            <input type="checkbox" id="exportCustomFronts" />
            Export custom front definitions
          </label>
          <label>
            <input type="checkbox" id="exportPolls" />
            Export poll options and votes
          </label>
          <label>
            <input type="checkbox" id="exportChat" />
            Export chat channels and messages
          </label>
        </div>

        <div class="radio-group">
          <label>
            <input type="radio" name="format" value="csv" checked />
            CSV
          </label>
          <label>
            <input type="radio" name="format" value="json" />
            JSON
          </label>
        </div>

        <button id="exportBtn">Export</button>

        <div class="progress">
          <div id="progressBar" class="bar"></div>
        </div>

        <div id="status" class="status"></div>

        <div class="footer">
          <span class="footer-note"
            >Runs entirely in your browser. Your API key is not stored.</span
          >
          <span id="appVersion" class="version"></span>
        </div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
